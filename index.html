<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f3d3e" />
  <meta name="description" content="أذكار صحيحة موثّقة: الصباح والمساء والنوم وحصن المسلم، بطاقات للمشاركة، مواقيت الصلاة، وأعمال صالحة. يعمل بدون إنترنت." />
  <title>أذكار — صحيحة موثّقة وبطاقات ومواقيت</title>

  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/icon-180.png" />
  <link rel="icon" href="icons/icon.svg" type="image/svg+xml" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Amiri+Quran&family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet" />

  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="app-header">
    <div class="header-inner">
      <button id="backBtn" class="icon-btn hidden" aria-label="رجوع">&#8594;</button>
      <h1 id="appTitle">أذكار</h1>
      <button id="themeBtn" class="icon-btn" aria-label="الوضع الليلي">&#9789;</button>
    </div>
  </header>

  <main id="view" class="container">
    <!-- يُحقن المحتوى ديناميكيًا -->
  </main>

  <div class="bottom-dock">
    <div class="player hidden" id="player">
      <button class="pl-btn" id="plPrev" aria-label="السابقة">⏮</button>
      <button class="pl-btn main" id="plToggle" aria-label="تشغيل">▶</button>
      <button class="pl-btn" id="plNext" aria-label="التالية">⏭</button>
      <div class="pl-info">
        <span id="plTitle"></span>
        <input type="range" id="plSeek" min="0" max="100" value="0" />
      </div>
      <button class="pl-btn" id="plClose" aria-label="إغلاق">✕</button>
    </div>

    <nav class="tabbar" id="tabbar">
      <button class="tab active" data-tab="athkar"><span class="tab-ic">📿</span><span>الأذكار</span></button>
      <button class="tab" data-tab="quran"><span class="tab-ic">🎧</span><span>القرآن</span></button>
      <button class="tab" data-tab="cards"><span class="tab-ic">🎴</span><span>بطاقات</span></button>
      <button class="tab" data-tab="deeds"><span class="tab-ic">🌿</span><span>أعمال</span></button>
      <button class="tab" data-tab="prayer"><span class="tab-ic">🕌</span><span>المواقيت</span></button>
    </nav>
  </div>

  <script src="data/adhkar.js"></script>
  <script src="data/adhkar_extra.js"></script>
  <script src="data/cards.js"></script>
  <script src="data/hisn.js"></script>
  <script src="data/deeds.js"></script>
  <script src="data/quran.js"></script>
  <script src="app.js"></script>
  <script>
    if ("serviceWorker" in navigator) {
      // إعادة تحميل تلقائية مرة واحدة عند تفعيل نسخة جديدة
      let refreshing = false;
      navigator.serviceWorker.addEventListener("controllerchange", () => {
        if (refreshing) return; refreshing = true; location.reload();
      });
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("sw.js").then((reg) => {
          // افحص وجود تحديث دوريًا
          reg.update();
          setInterval(() => reg.update(), 60 * 60 * 1000);
          reg.addEventListener("updatefound", () => {
            const nw = reg.installing;
            if (nw) nw.addEventListener("statechange", () => {
              if (nw.state === "installed" && navigator.serviceWorker.controller) nw.postMessage("skipWaiting");
            });
          });
        }).catch(() => {});
      });
    }
  </script>
</body>
</html>
